.cobrar-btn{background:#f85149;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.cobrar-btn:hover{background:#da3633}
.status-select{background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;cursor:pointer}
.badge-unread{display:inline-block;background:#1f6feb;width:7px;height:7px;border-radius:50%;margin-right:2px;vertical-align:middle}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#8b949e;gap:8px}
.empty-icon{font-size:36px;opacity:.4}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.progress-label{font-size:12px;color:#8b949e;width:80px}
.progress-bar{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s}
.progress-pct{font-size:11px;color:#8b949e;width:30px;text-align:right}
.comment-input-row{display:flex;gap:8px;align-items:flex-end}
.comment-input{flex:1;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;resize:none;height:50px}
.comment-input:focus{outline:none;border-color:#388bfd}
.notif-panel{position:absolute;top:52px;right:16px;width:300px;background:#161b22;border:1px solid #30363d;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;max-height:320px;overflow-y:auto}
.notif-item{padding:10px 14px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .15s}
.notif-item:hover{background:#21262d}
.notif-item-title{font-size:12px;color:#e6edf3;margin-bottom:2px}
.notif-item-sub{font-size:11px;color:#8b949e}
.notif-dot-item{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;flex-shrink:0}
</style>
<script>
const {useState,useMemo,useRef,useEffect}=React;

const USERS=[
  {id:1,name:"Maria Souza",role:"Gestora",initials:"MS",color:"#1f6feb",isAdmin:true,isManager:true},
  {id:2,name:"João Lima",role:"Engenheiro",initials:"JL",color:"#3fb950",isEngineer:true},
  {id:3,name:"Pedro Rocha",role:"Manutenção",initials:"PR",color:"#db6d28"},
  {id:4,name:"Ana Costa",role:"Administradora",initials:"AC",color:"#8957e5",isAdmin:true},
  {id:5,name:"Carlos Mendes",role:"Técnico",initials:"CM",color:"#d29922"},
];

const STATUS_CONFIG={
  "Não visualizada":{color:"#6e7681",bg:"#6e768122"},
  "Visualizada":{color:"#388bfd",bg:"#388bfd22"},
  "Em andamento":{color:"#d29922",bg:"#d2992222"},
  "Aguardando peça":{color:"#db6d28",bg:"#db6d2822"},
  "Pausada":{color:"#8957e5",bg:"#8957e522"},
  "Concluída":{color:"#3fb950",bg:"#3fb95022"},
  "Cancelada":{color:"#f85149",bg:"#f8514922"},
};

const PRIORITY_CONFIG={
  "Baixa":{color:"#6e7681",bg:"#6e768122"},
  "Média":{color:"#388bfd",bg:"#388bfd22"},
  "Alta":{color:"#d29922",bg:"#d2992222"},
  "Urgente":{color:"#db6d28",bg:"#db6d2822"},
  "Crítica":{color:"#f85149",bg:"#f8514922"},
};

const now=new Date();
const d=(offset)=>{const dt=new Date(now);dt.setDate(dt.getDate()+offset);return dt.toLocaleDateString("pt-BR");};

const INITIAL_TASKS=[
  {id:1,title:"Verificar vazamento da máquina X — Setor 2",desc:"Identificado vazamento de óleo hidráulico na lateral da máquina. Necessário inspeção urgente.",priority:"Urgente",status:"Em andamento",category:"Manutenção",from:1,to:[3],toType:"user",created:d(-3),due:d(0),viewed:[{userId:3,at:"Hoje 08:12"}],comments:[{userId:3,text:"Máquina inspecionada. Vedação com desgaste avançado.",time:"Hoje 08:30"},{userId:3,text:"Peça solicitada ao almoxarifado. Aguardando confirmação.",time:"Hoje 10:15"}],history:[{action:"Criada por Maria Souza",at:d(-3)},{action:"Visualizada por Pedro Rocha",at:d(-2)},{action:"Status alterado: Em andamento",at:d(-2)},{action:"Comentário adicionado",at:"Hoje 08:30"}]},
  {id:2,title:"Reunião de equipe — sexta às 14h",desc:"Pauta: indicadores de manutenção do Q2, distribuição de escalas e novos protocolos.",priority:"Média",status:"Não visualizada",category:"Aviso",from:1,to:[1,2,3,4,5],toType:"all",created:d(-1),due:d(2),viewed:[{userId:1,at:"Hoje 07:00"}],comments:[],history:[{action:"Criada por Maria Souza",at:d(-1)}]},
  {id:3,title:"Trocar rolamento do motor B7",desc:"Rolamento com ruído excessivo. Técnico solicitou parada programada para substituição.",priority:"Alta",status:"Aguardando peça",category:"Manutenção",from:2,to:[5],toType:"user",created:d(-5),due:d(1),viewed:[{userId:5,at:d(-4)+" 09:40"}],comments:[{userId:5,text:"Rolamento identificado: SKF 6205. Pedido já feito.",time:d(-4)+" 14:00"}],history:[{action:"Criada por João Lima",at:d(-5)},{action:"Visualizada por Carlos Mendes",at:d(-4)},{action:"Status alterado: Aguardando peça",at:d(-4)},{action:"Comentário adicionado",at:d(-4)}]},
  {id:4,title:"Atualizar plano de manutenção preventiva — 2º semestre",desc:"Revisar cronograma e atualizar as fichas de cada equipamento conforme inspeções recentes.",priority:"Média",status:"Visualizada",category:"Solicitação",from:1,to:[2],toType:"user",created:d(-2),due:d(5),viewed:[{userId:2,at:"Ontem 16:20"}],comments:[],history:[{action:"Criada por Maria Souza",at:d(-2)},{action:"Visualizada por João Lima",at:d(-1)}]},
  {id:5,title:"CRÍTICO: Falha no sistema elétrico — Painel 3",desc:"Disjuntor disparando repetidamente. Risco de parada total da linha de produção.",priority:"Crítica",status:"Em andamento",category:"Manutenção",from:4,to:[2,5],toType:"user",created:"Hoje",due:"Hoje",viewed:[{userId:2,at:"Hoje 06:15"},{userId:5,at:"Hoje 06:20"}],comments:[{userId:2,text:"Em análise. Possível sobrecarga no circuito 3B.",time:"Hoje 07:00"},{userId:5,text:"Medições feitas: tensão irregular. Aguardando técnico especializado.",time:"Hoje 08:45"}],history:[{action:"Criada por Ana Costa",at:"Hoje"},{action:"Visualizada por João Lima",at:"Hoje 06:15"},{action:"Visualizada por Carlos Mendes",at:"Hoje 06:20"},{action:"Status alterado: Em andamento",at:"Hoje 07:00"}]},
  {id:6,title:"Limpeza e lubrificação — compressores do setor A",desc:"Manutenção preventiva mensal dos compressores CP-01 a CP-04.",priority:"Baixa",status:"Concluída",category:"Manutenção",from:1,to:[3],toType:"user",created:d(-8),due:d(-2),viewed:[{userId:3,at:d(-7)+" 07:30"}],comments:[{userId:3,text:"Concluído. Todos os compressores lubrificados e testados.",time:d(-2)+" 17:00"}],history:[{action:"Criada por Maria Souza",at:d(-8)},{action:"Concluída por Pedro Rocha",at:d(-2)}]},
  {id:7,title:"Treinamento: NR-12 — operadores novos",desc:"Agendar e realizar treinamento de segurança para os 4 novos operadores do turno da tarde.",priority:"Alta",status:"Pausada",category:"Solicitação",from:1,to:[1,2,4,5],toType:"sector",created:d(-4),due:d(3),viewed:[{userId:2,at:d(-3)},{userId:4,at:d(-3)},{userId:5,at:d(-2)}],comments:[{userId:4,text:"Instrutor confirmado para a semana que vem.",time:d(-1)}],history:[{action:"Criada por Maria Souza",at:d(-4)},{action:"Status alterado: Pausada",at:d(-2)}]},
];

const INITIAL_NOTIFS=[
  {id:1,title:"⚡ Tarefa crítica atribuída a você",sub:"CRÍTICO: Falha no sistema elétrico — Painel 3",read:false},
  {id:2,title:"🔔 Cobrança de atualização",sub:"Pedro Rocha: Verificar vazamento da máquina X",read:false},
  {id:3,title:"Nova tarefa recebida",sub:"Treinamento NR-12 — operadores novos",read:true},
];

const Avatar=({user,size=24})=>{
  const style={width:size,height:size,minWidth:size,borderRadius:"50%",background:user.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.35,fontWeight:700,color:"#fff"};
  return React.createElement("div",{style},user.initials);
};

const StatusPill=({status})=>{
  const cfg=STATUS_CONFIG[status]||{color:"#8b949e",bg:"#8b949e22"};
  return React.createElement("span",{className:"status-pill",style:{background:cfg.bg,color:cfg.color}},
    React.createElement("span",{style:{width:5,height:5,borderRadius:"50%",background:cfg.color,display:"inline-block"}}),
    status
  );
};

const PriorityPill=({priority})=>{
  const cfg=PRIORITY_CONFIG[priority]||{color:"#8b949e",bg:"#8b949e22"};
  return React.createElement("span",{className:"priority-pill",style:{background:cfg.bg,color:cfg.color}},priority);
};

function App(){
  const [currentUserId,setCurrentUserId]=useState(1);
  const [view,setView]=useState("dashboard");
  const [tasks,setTasks]=useState(INITIAL_TASKS);
  const [filter,setFilter]=useState("Todas");
  const [showCreate,setShowCreate]=useState(false);
  const [selectedTask,setSelectedTask]=useState(null);
  const [notifs,setNotifs]=useState(INITIAL_NOTIFS);
  const [showNotifs,setShowNotifs]=useState(false);
  const [newComment,setNewComment]=useState("");

  const currentUser=USERS.find(u=>u.id===currentUserId);
  const unreadNotifs=notifs.filter(n=>!n.read).length;

  const myTasks=useMemo(()=>{
    if(currentUser.isAdmin)return tasks;
    return tasks.filter(t=>t.to.includes(currentUserId)||t.from===currentUserId);
  },[tasks,currentUserId,currentUser]);

  const filteredTasks=useMemo(()=>{
    if(filter==="Todas")return myTasks;
    if(filter==="Pendentes")return myTasks.filter(t=>!["Concluída","Cancelada"].includes(t.status));
    if(filter==="Urgentes")return myTasks.filter(t=>["Urgente","Crítica"].includes(t.priority));
    if(filter==="Concluídas")return myTasks.filter(t=>t.status==="Concluída");
    if(filter==="Atrasadas")return myTasks.filter(t=>t.due===d(0)&&!["Concluída","Cancelada"].includes(t.status));
    if(filter==="Manutenção")return myTasks.filter(t=>t.category==="Manutenção");
    return myTasks.filter(t=>t.status===filter||t.category===filter||t.priority===filter);
  },[myTasks,filter]);

  const sortedTasks=useMemo(()=>{
    return [...filteredTasks].sort((a,b)=>{
      const pOrder={"Crítica":0,"Urgente":1,"Alta":2,"Média":3,"Baixa":4};
      if(pOrder[a.priority]!==pOrder[b.priority])return pOrder[a.priority]-pOrder[b.priority];
      return 0;
    });
  },[filteredTasks]);

  const stats={
    total:myTasks.length,
    pending:myTasks.filter(t=>!["Concluída","Cancelada"].includes(t.status)).length,
    done:myTasks.filter(t=>t.status==="Concluída").length,
    critical:myTasks.filter(t=>t.priority==="Crítica").length,
    urgent:myTasks.filter(t=>t.priority==="Urgente").length,
    overdue:myTasks.filter(t=>t.due===d(0)&&!["Concluída","Cancelada"].includes(t.status)).length,
  };

  const handleTaskClick=(task)=>{
    const wasUnread=!task.viewed.some(v=>v.userId===currentUserId);
    if(wasUnread){
      setTasks(prev=>prev.map(t=>{
        if(t.id!==task.id)return t;
        const newStatus=t.status==="Não visualizada"?"Visualizada":t.status;
        return{...t,status:newStatus,viewed:[...t.viewed,{userId:currentUserId,at:"Agora"}],history:[...t.history,{action:`Visualizada por ${currentUser.name}`,at:"Agora"}]};
      }));
    }
    setSelectedTask(tasks.find(t=>t.id===task.id)||task);
  };

  const handleStatusChange=(taskId,newStatus)=>{
    setTasks(prev=>prev.map(t=>{
      if(t.id!==taskId)return t;
      return{...t,status:newStatus,history:[...t.history,{action:`Status alterado para: ${newStatus} por ${currentUser.name}`,at:"Agora"}]};
    }));
    setSelectedTask(prev=>prev?{...prev,status:newStatus,history:[...prev.history,{action:`Status alterado para: ${newStatus}`,at:"Agora"}]}:null);
  };

  const handleAddComment=(taskId)=>{
    if(!newComment.trim())return;
    const comment={userId:currentUserId,text:newComment.trim(),time:"Agora"};
    setTasks(prev=>prev.map(t=>{
      if(t.id!==taskId)return t;
      return{...t,comments:[...t.comments,comment],history:[...t.history,{action:`Comentário adicionado por ${currentUser.name}`,at:"Agora"}]};
    }));
    setSelectedTask(prev=>prev?{...prev,comments:[...prev.comments,comment]}:null);
    setNewComment("");
  };

  const handleCobrar=(taskId)=>{
    setTasks(prev=>prev.map(t=>{
      if(t.id!==taskId)return t;
      return{...t,history:[...t.history,{action:`⚠️ Cobrança de atualização enviada por ${currentUser.name}`,at:"Agora"}]};

    React.createElement("div",{className:"main",style:{position:"relative"}},
      React.createElement("div",{className:"topbar"},
        React.createElement("div",{className:"topbar-title"},viewTitles[view]||""),
        React.createElement("div",{className:"topbar-actions"},
          React.createElement("button",{className:"btn-primary",onClick:()=>setShowCreate(true)},
            React.createElement("span",{style:{fontSize:16,lineHeight:1}},"＋"),"Nova tarefa"
          ),
          React.createElement("button",{className:"notif-btn",onClick:()=>setShowNotifs(v=>!v)},
            "🔔",unreadNotifs>0&&React.createElement("span",{className:"notif-dot"})

          React.createElement("button",{className:"btn-ghost",style:{fontSize:11,padding:"2px 6px"},onClick:()=>{setNotifs(p=>p.map(n=>({...n,read:true})));setShowNotifs(false)}},"Marcar tudo")
        ),
        notifs.length===0?React.createElement("div",{style:{padding:14,color:"#8b949e",fontSize:12}},"Nenhuma notificação"):
        notifs.map(n=>React.createElement("div",{key:n.id,className:"notif-item",onClick:()=>{setNotifs(p=>p.map(x=>x.id===n.id?{...x,read:true}:x));setShowNotifs(false);}},
          React.createElement("div",{className:"notif-item-title"},!n.read&&React.createElement("span",{className:"notif-dot-item",style:{background:"#388bfd"}}),n.title),
          React.createElement("div",{className:"notif-item-sub"},n.sub)
        ))
      ),
      React.createElement("div",{className:"content"},
        view==="dashboard"&&React.createElement(DashboardView),
        view==="agenda"&&React.createElement(AgendaView),
        view==="calendar"&&React.createElement(CalendarView),
      ),
      showCreate&&React.createElement(CreateModal),
      selectedTask&&React.createElement(TaskDetailModal,{task:selectedTask,onClose:()=>setSelectedTask(null)})
    )
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(React.createElement(App));
</script>
